Department: Educational Psychology
Description: Using simulation study to work on cheating detection, including detecting preknowledge and collusion in credential exams. We will look at the response pattern and response time of examinees. In the course of conducting simulation studies using process data (e.g., response pattern and response time data) to evaluate methods to detect cheating on tests, we intend to fit a number of computationally demanding psychometric models.
