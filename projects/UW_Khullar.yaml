Department: Department of Astronomy
Description: Using space-based (JWST and Hubble) observations of distant galaxies
  to understand the cessation of star formation in the earliest epoch of the Universe.
  This project requires computational resources to conduct parallelized Bayesian stellar
  population synthesis modeling (via Python-based frameworks) using two datasets --
  UNCOVER and LEGGOS. (https://jwst-uncover.github.io/, https://www.stsci.edu/jwst-program-info/download/jwst/pdf/4125/)
