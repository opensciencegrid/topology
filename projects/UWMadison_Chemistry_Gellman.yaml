Department: Department of Chemistry
Description: "Research in our group is motivated by a fascination with complex molecular\
  \ phenomena in biological systems, including catalysis, recognition and signal transduction.\
  \ These phenomena are typically mediated by proteins and depend on specific folding\
  \ patterns.  Some of our projects focus on natural proteins themselves, but for\
  \ many others, proteins serve as a source of inspiration for the creation of new\
  \ folding molecules (\u201Cfoldamers\u201D) that display sophisticated functions.\
  \ Our work draws on concepts and tools from many disciplines that have historically\
  \ been pursued in isolation, including organic chemistry, materials chemistry, biochemistry,\
  \ biophysics, molecular biology and cell biology."
