Department: Mechanical Engineering
Description: Three-dimensional nanostructures are promising candidates for next-generation
  thermal management applications. Here, we employ molecular dynamics simulations
  to systematically examine thermal transport in these materials. The effects of mechanical
  deformation and point defects are investigated as key factors governing nanoscale
  heat conduction.
