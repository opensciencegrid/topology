Department: Physics
Description: We are running codes to model gravitational waves from sources relevant
  to the LISA mission (Laser Interferometer Space Antenna), specifically from extreme-mass
  ratio (EMRI) black hole binaries and coincident galactic binaries (especially white
  dwarf binaries in the Milky Way). The EMRI code aims to provide detailed information
  for ultimate use in LISA Data Analysis. The Galactic Binary aspect of the project
  aims to develop ways to deal with confusion between similar signals that occur at
  the same time and are visible simultaneously by the LISA detector.
