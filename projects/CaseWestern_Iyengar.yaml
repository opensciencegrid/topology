Department: Department of Population and Quantitative Health Sciences
Description: Recent collaborative efforts from the T2T Consortium and 1000 Genome
  ONT Vienna project have enabled researchers to incorporate structural variants into
  population-level research, which is a shift from the field's traditional focus on
  small polymorphisms. Our goal is to characterize the biological function of these
  structural variants using publicly available summary statistics.
