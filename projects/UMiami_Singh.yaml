Department: The Miami Project to Cure Paralysis, Department of Neurological Surgery
Description: Our work focuses on large-scale bioinformatics analysis of multi-omics
  datasets related to spinal cord injury, traumatic brain injury, and neuroregeneration.
  We analyze single-cell RNA sequencing, spatial transcriptomics (MERFISH/MERSCOPE),
  metagenomics, and other high-throughput sequencing data to identify cellular and
  molecular mechanisms involved in neural injury and repair. The project involves
  developing and running scalable bioinformatics pipelines to process large datasets
  and support multiple research groups at the Miami Project to Cure Paralysis.
