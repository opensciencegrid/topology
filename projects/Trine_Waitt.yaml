Department: Department of Chemistry and Forensic Science
Description: Quantum-chemical characterization of small molecules for machine-learning-based taste prediction. We compute molecular descriptors (partial charges, HOMO/LUMO gaps, dipole moments, electrostatic potential surfaces) via high-throughput ORCA single-point energy calculations across large libraries of taste-relevant compounds. This workload requires distributed high-throughput computing to evaluate whether QM-derived features improve ML taste models over standard cheminformatics descriptors (e.g., RDKit). The project supports an active undergraduate research program spanning cheminformatics and bioinformatics tracks in taste receptor activation modeling.
