Department: Information Systems and Technology
Description: 'Code obfuscation is the dominant mechanism by which modern malware evades
  static detection, yet the defensive literature has largely treated obfuscation as
  noise to be suppressed rather than as a signal to be attributed. This article inverts
  that perspective and asks a complementary, forensically valuable question: given
  only the static form of a transformed code artifact, can the obfuscation toolchain
  that produced it be identified, and can a system recognise that a transformation
  it has never seen before is novel? We introduce ObfuScope a reproducible framework
  and empirical study built on a corpus of obfuscated C artifacts.'
