Department: Comparative Biosciences
Description: Cells experience tens of thousands of DNA lesions per day that must be
  repaired to ensure that genetic stability is maintained. These lesions include base
  damage and strand breaks caused by environmental genotoxins as well as viral insult.
  The Mehta lab focuses on understanding the replication stress response and the mutagenic
  consequences of DNA-strand specific obstacles. Our goal is to provide a new context
  for understanding how endogenous and exogenous/environmental stresses mutagenize
  DNA and how repair mechanisms maintain faithful replication.
