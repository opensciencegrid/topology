Department: Entomology
Description: Well over 150 ant genomes have now been fully sequenced, representing
  a rich dataset to better understand the evolution of this keystone insect family.
  However, relatively few analyses leveraging these data have been performed. This
  project aims to close this gap, correlating genomes and ecological and behavioral
  characteristics across the ants.
