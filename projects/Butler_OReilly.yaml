Department: Department of Chemistry and Biochemistry
Description: Our research focuses on the synthesis and computational characterization
  of tungsten organometallic complexes containing tris(pyrazolyl)methane (Tpm) ligands
  and their derivatives. Using quantum chemical methods, I plan to investigate how
  ligand substitution, coordination environment, and hydrogen bonding with counterions
  influence molecular structure, electronic properties, and experimentally observable
  spectroscopic behavior such as IR and NMR spectra.
