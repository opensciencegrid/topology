Department: Physics
Description: 'Entanglement Dynamics:

  The dynamics of quantum entanglement is the key to the understanding of many important
  questions like how generic systems reach thermal equilibrium and how quantum information
  spreads under the unitary evolution of many-body systems. It has been found that
  quantum systems can enter different dynamical phases with different entanglement
  scaling. I am interested in developing the tools to understand the phase transitions
  between these different dynamical phases. I am also interested in the evolution
  of quantum entanglement in many-body systems that exhibit quantum chaos.'
