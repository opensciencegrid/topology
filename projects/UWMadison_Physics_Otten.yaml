Department: Department of Physics
Description: "The Otten Lab\u2019s goal is to accelerate the realization of useful,\
  \ utility-scale quantum computers, networks, and sensors. We develop, analyze, and\
  \ test quantum algorithms for applications in quantum chemistry, quantum dynamics,\
  \ and quantum machine learning. Our team also focuses on creating and implementing\
  \ quantum characterization, verification, and validation (QCVV) methods to understand\
  \ and mitigate inevitable errors."
