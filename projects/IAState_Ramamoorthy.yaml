Department: Electrical and Computer Engineering
Description: 'My research involves investigating techniques for machine learning that
  are robust in the presence of worker failures and non-idealities. This work involves
  a combination of theoretical and numerical analysis. The numerical experiments can
  be expensive and HPC resources are useful there. A parallel line of work investigates
  quantum communication protocols. HPC can be useful for simulating these protocols
  as well.


  My website can be found here: http://www.ece.iastate.edu/adityar'
