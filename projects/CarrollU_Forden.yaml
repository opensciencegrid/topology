Department: The Sullivan School of Business, Engineering and Technology
Description: This research seeks to reshape how students interact with large language
  models (LLMs) at the earliest stages of learning by aligning AI support with authentic
  novice thinking rather than expert assumptions. The project will produce the first
  educational dataset of its kind, systematically capturing student-generated comments,
  explanations, and learning artifacts to support more equitable, interpretable, and
  instructionally meaningful LLM-driven tools.
