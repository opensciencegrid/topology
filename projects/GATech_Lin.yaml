Department: Nuclear & Radiological Engineering and Medical Physics
Description: The Emory Proton Therapy Center has previously developed a treatment
  planning simulation code that simultaneously optimizes dose, dose-averaged dose
  rate, and Linear Energy Transfer (LET) for a pin-and-bar collimator. This project
  aims to accelerate this simulation through the use of GPU-based simulation code
  and through training a diffusion model for treatment plan generation.
