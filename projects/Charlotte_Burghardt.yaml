Department: School of Data Science
Description: We are creating new algorithms to automatically create fine-tuned foundation
  models with a single forward pass from a neural network. We start with tabular foundation
  models. We create neural network trained on foundation models fine-tuned with a
  given set of data to learn how to make any LoRA matrix (fine-tuned parameters) given
  any dataset fed to it without the additional effort of fine-tuning.
