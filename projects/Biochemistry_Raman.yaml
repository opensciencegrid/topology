Department: Biochemistry
Description: 'The Raman laboratory takes a systems and synthetic biology approach
  to understanding and designing different biological systems: biomolecules, regulatory
  pathways, and organisms. We are interested in understanding and designing allosteric
  proteins, synthetic bacteriophages with new host range and regulation, and developing
  high-throughput functional assays to predict the effect of variants in disease-relevant
  genes. To address these questions, we leverage computational protein design, next-generation
  DNA synthesis and sequencing technologies, and highly multiplexed selection and
  screening assays. From these large datasets, we seek to elucidate underlying relationships
  between sequence, structure and function, and to design novel function.'
