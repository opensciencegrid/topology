Department: Pervasive Technology Institute
Description: CONECT Staff Allocation. The COre National Ecosystem for CyberinfrasTructure
  (CONECT) project delivers innovative integrations across the NSF-funded cyberinfrastructure
  ecosystem in the areas of operations, data and networking, and cybersecurity. CONECT
  uses agile mechanisms to integrate the rapidly diversifying set of non-traditional
  resources that previously have been left on the fringes of the national cyberinfrastructure.
  CONECT builds upon the successes of its predecessors and moves toward a more agile,
  dynamic, and inclusive ecosystem. CONECT introduces and coordinates a framework-based
  approach to ecosystem-wide integration using step-by-step integration roadmaps and
  modular concepts that enable entirely new kinds of cyberinfrastructure resources
  to fully participate in the coordinated national cyberinfrastructure. Integral to
  this new approach is the Information Sharing Platform for sharing cyberinfrastructure
  integration and operations information between people, while also enabling cyberinfrastructure
  components to discover and securely access integrated resources and other components;
  increased network reliability enabled by expanded metrics insights and availability;
  opportunities for more control over data transfer such as transfer scheduling and
  network programmability; new Cybersecurity Governance Council and coordination groups;
  modern authentication strategies and technologies; and focus on broad protection
  of ACCESS resources through the sharing of cybersecurity threat intelligence.
