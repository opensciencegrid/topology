Department: Computer Science
Description: "AI/ML Workflows Across National Cyberinfrastructure: From Cloud Prototyping\
  \ to HPCTraining to Large-Scale HTC Inference with Jetstream2, Anvil, and the Open\
  \ Science Pool\n\nModern AI/ML research increasingly spans multiple computing paradigms,\
  \ from interactive cloud-based development to large-scale GPU training on traditional\
  \ HPC systems and high-throughput inference across distributed resources.This full-day\
  \ tutorial provides participants with a guided, hands-on tour of the U.S. national\
  \ research cyberinfrastructure ecosystem through a single, coherent ML workflow\
  \ deployed across Jetstream2, Anvil, and the OSPool. This tutorial is designed to\
  \ build cyberinfrastructure literacy and practical workforce skills for PEARC\u2019\
  s research-facing audiences navigating AI/ML workflows on national-scale resources.\
  \ Participants will learn how to prototype models on on-demand cloud GPUs, scale\
  \ training onHPC systems, and deploy large-scale inference workloads using distributed\
  \ high-throughput computing. The tutorial explicitly prioritizes conceptual clarity\
  \ and hands-on experience over algorithmic novelty. Emphasis is placed on understanding\
  \ why each resource is used, how workflows transition between systems, and what\
  \ design decisions enable portability, scalability, and reproducibility across heterogeneous\
  \ CI environments."
