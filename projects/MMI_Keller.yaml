Department: Medical Microbiology & Immunology
Description: Our research focus lies in genetically dissecting those aspects of fungi
  that render them potent pathogens and superb secondary metabolite machines. We do
  this by elucidating molecules involved in the virulence of plant, animal, and human
  pathogenic fungi, while also expressing novel bioactive fungal secondary metabolites
  for drug development.
