Department: Autism Center
Description: This project studies autism-relevant brain/behavior relationships through
  computational neurobiology, EEG/fMRI connectivity, circuit-level dynamics, and behavioral/phenotypic
  correlates. Our goals are to develop reproducible computational methods for studying
  autism-relevant neurobiology and behavior using EEG/fMRI-derived connectivity, criticality/E-I
  metrics, and behavioral/phenotypic covariates to test how individual differences
  in neural systems and circuits relate to cognition, affect regulation, and autism-associated
  behavioral profiles. High-throughput computing will support transparent subject-level
  processing, parameter sweeps, bootstrap/permutation analyses, and auditable derived
  outputs from open pilot datasets and approved SFARI Base resources.
