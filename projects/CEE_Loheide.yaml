Department: Civil and Environmental Engineering
Description: Our research group is interested in science and engineering aspects of
  the movement of water through the environment as related to the complex and changing
  interactions among water needed for municipal and industrial uses, agriculture,
  and natural ecosystems. Much of our efforts are focused on improving the scientific
  context of ecosystem restoration; in particular, we develop methods to quantify
  and understand the processes controlling the exchange of water between groundwater,
  vadose water, vegetation, streams, and the atmosphere.
