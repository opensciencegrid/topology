Department: Institute for Nuclear Theory
Description: Parameter estimation studies of simulated gravitational wave observations
  of low mass compact binary coalescences, utilizing nuclear-physics-informed-priors
  on neutron star properties. We investigate how dark matter influences the neutron
  star equation of state and, by extension, the observable gravitational-wave signatures
  from binary neutron stars. This work falls under the objectives of N3AS (Network
  for Neutrinos, Nuclear Astrophysics and Symmetries), an NSF Physics Frontier Center.
  https://n3as.berkeley.edu/
