Department: Department of Bacteriology
Description: 'The study of life is the examination of interactions; cooperations of
  species within ecosystems, adaptation of living organisms to environment stimuli,
  and partnerships of atoms within the active sites of enzymes. Our lab studies biological
  interactions at the molecular level. We are particularly interested in the structures,
  functions, and mechanisms of bacterial proteins with consequences to prokaryotic
  physiology and symbiosis with eukaryotes. Using X-ray crystallography as our primary
  tool, we draw on our diverse backgrounds in microbiology, biophysics, biochemistry
  and chemistry to uniquely approach our two main areas of research: Type IV pili
  (T4P) and bacteriophytochromes.'
