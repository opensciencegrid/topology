Department: Biochemistry
Description: Integral membrane proteins control to the movement of molecules and signals
  across the membrane. We use nuclear magnetic resonance (NMR) as our primary technique
  to monitor protein structure and dynamics, taking advantage of the extensive resources
  available through the National Magnetic Resonance Facility at Madison (NMRFAM).
  By comparing our NMR data with biochemical and functional assays, we gain insight
  into the mechanisms of secondary active transport, multidrug recognition, ion channel
  gating and ion selectivity.
