Department: Physics
Description: The physical conditions of the interstellar medium - the stuff between
  the stars - are revealed through spectroscopic observations. Probabilistic models
  are a novel technique to infer these conditions from observations. This project
  uses high throughput computing to fit bayes_spec (https://joss.theoj.org/papers/10.21105/joss.07201)
  probabilistic models to a variety of simulated and real datasets.
