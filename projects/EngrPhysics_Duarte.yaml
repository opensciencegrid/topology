Department: Department of Nuclear Engineering & Engineering Physics
Description: "We work on the safety analysis and thermal-hydraulics of nuclear reactors\
  \ and fusion machines. Thermal-hydraulics englobes nuclear reactors\u2019 multi-phase\
  \ heat transfer and fluid mechanics analysis, while safety analysis includes the\
  \ study of transients, accident scenarios, and risk assessment. These two areas\
  \ are closely related in the study of complex systems involving thermal processes\
  \ and hazards, such as nuclear and chemical hazards. Particularly, we are interested\
  \ in advanced nuclear systems where thermal and safety analysis play a critical\
  \ role from the early stages of development to deployment."
FieldOfScience: Nuclear Physics
