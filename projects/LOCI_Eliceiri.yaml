Department: Laboratory for Optical and Computational Instrumentation
Description: Our lab develops new biomedical imaging instruments and image analysis
  tools to help fight disease. These projects include developing measures that can
  predict the progression of cancer, building instruments that can image living creatures
  more gently than traditional methods, using machine learning to classify medical
  images, and developing open-source software for use by the image analysis community
  around the world.
